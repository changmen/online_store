server:
  port: 8080

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  cloud:
    nacos:
      discovery:
        enabled: ${NACOS_ENABLED:false}
        register-enabled: ${NACOS_ENABLED:false}
    service-registry:
      auto-registration:
        enabled: ${NACOS_ENABLED:false}
  application:
    name: online-store
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/online_store?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      jedis:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

# BAD CASE: 不安全的Actuator配置，暴露所有敏感端点
management:
  endpoints:
    web:
      exposure:
        include: "*"  # 暴露所有端点，包括敏感端点
      base-path: /actuator
  endpoint:
    health:
      show-details: always  # 显示详细的健康信息，可能包含敏感数据
    env:
      show-values: always  # 显示所有环境变量值，包括敏感信息
    shutdown:
      enabled: true  # 允许远程关闭应用，存在安全风险
  info:
    env:
      enabled: true  # 暴露环境信息

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.onlinestore.model
  configuration:
    map-underscore-to-camel-case: true

service:
  user:
    base-url: http://localhost:8080

admin:
  auth:
    username: admin
    password: password