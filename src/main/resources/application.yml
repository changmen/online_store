server:
  port: 8080

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  cloud:
    nacos:
      discovery:
        enabled: ${NACOS_ENABLED:false}
        register-enabled: ${NACOS_ENABLED:false}
    service-registry:
      auto-registration:
        enabled: ${NACOS_ENABLED:false}
  application:
    name: online-store
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:online_store}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:0}
      jedis:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

management:
  endpoints:
    web:
      exposure:
        include: health,info,configinfo,dbinfo,systeminfo
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
    env:
      show-values: never
    shutdown:
      enabled: false
  info:
    env:
      enabled: true

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.onlinestore.model
  configuration:
    map-underscore-to-camel-case: true

service:
  user:
    base-url: http://localhost:8080

admin:
  auth:
    username: admin
    password: password